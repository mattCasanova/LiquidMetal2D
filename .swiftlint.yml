identifier_name:
  min_length:
    warning: 1
  excluded:
    - id
  allowed_symbols:
    - _
  validates_start_with_lowercase: warning

trailing_whitespace:
  ignores_empty_lines: true

line_length:
  warning: 120
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 700

force_try: warning

excluded:
  - .build
